# SPDX-License-Identifier: MIT
#
# Build the package and run the SupervisorCore test suite on macOS.
#
# Notarization and Homebrew publishing are intentionally not wired up here yet;
# they need signing secrets and an Apple Developer account. The Developer ID
# signing and notarization steps are stubbed in scripts/package-app.sh.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: make test
