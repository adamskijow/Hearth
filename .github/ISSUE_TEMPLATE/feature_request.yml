name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Hearth makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Note: Hearth is an availability layer, not an inference layer. Requests to pick models, set context length, do RAG or chat, or otherwise perform inference are out of scope by design.
