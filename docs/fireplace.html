<!doctype html>

<!-- A WebGL fragment-shader fireplace for Hearth. Open in a browser. This is a
     prototype: it can also be captured to a GIF for the README later. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hearth</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0503; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; }
  .mark {
    position: fixed; left: 0; right: 0; bottom: 6%; text-align: center;
    font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    color: #ffe6c4; font-size: clamp(28px, 6vw, 64px); letter-spacing: 2px;
    text-shadow: 0 0 24px rgba(255,140,40,0.55); pointer-events: none; opacity: 0.92;
  }
  .sub {
    position: fixed; left: 0; right: 0; bottom: 3.5%; text-align: center;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    color: #ffb368; font-size: clamp(10px, 1.6vw, 15px); letter-spacing: 3px;
    pointer-events: none; opacity: 0.8;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: true, premultipliedAlpha: false });

const vert = `
attribute vec2 a;
void main(){ gl_Position = vec4(a, 0.0, 1.0); }`;

const frag = `
precision highp float;
uniform vec2 R;
uniform float T;

float hash(vec2 p){ p = fract(p*vec2(123.34, 345.45)); p += dot(p, p+34.345); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash(i), b = hash(i+vec2(1.,0.)), c = hash(i+vec2(0.,1.)), d = hash(i+vec2(1.,1.));
  vec2 u = f*f*(3.-2.*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for(int i=0;i<5;i++){ v += a*noise(p); p = p*2.02 + 7.1; a *= 0.5; }
  return v;
}

void main(){
  vec2 uv = gl_FragCoord.xy / R;
  float aspect = R.x / R.y;
  float cx = (uv.x - 0.5) * aspect;
  float t = T * 0.75;

  // rising, domain-warped noise, with a finer octave for tongues
  vec2 q = vec2(cx * 3.4, uv.y * 3.2 - t);
  float warp = fbm(q * 1.4 + vec2(0.0, -t*0.5));
  float n = fbm(q + warp * 0.8);
  float detail = fbm(q * 2.3 + vec2(0.0, -t*0.9));

  // flame silhouette: hot at the base, tapering, with wavy edges
  float width = 0.40 - uv.y * 0.30;
  float lobe = 0.05 * sin(uv.y*8.0 - T*2.2) + 0.03 * sin(uv.y*19.0 + T*3.0);
  float shape = 1.0 - smoothstep(0.0, max(width + lobe, 0.02), abs(cx));
  float vert = smoothstep(0.02, 0.14, uv.y) * (1.0 - smoothstep(0.48, 1.0, uv.y));
  // low baseline so the noise carves the body into tongues rather than a blob
  float fire = clamp(shape * vert * (0.05 + n*1.25 + detail*0.5), 0.0, 1.0);
  fire = pow(fire, 1.7);

  // warm color ramp: black -> deep red -> orange -> yellow -> white core
  vec3 col = vec3(0.0);
  col = mix(col, vec3(0.45, 0.04, 0.005), smoothstep(0.04, 0.22, fire));
  col = mix(col, vec3(0.92, 0.26, 0.03),  smoothstep(0.18, 0.45, fire));
  col = mix(col, vec3(1.00, 0.66, 0.13),  smoothstep(0.42, 0.72, fire));
  col = mix(col, vec3(1.00, 0.93, 0.66),  smoothstep(0.82, 1.00, fire));

  // embers drifting up
  float em = 0.0;
  for(int i=0;i<3;i++){
    float fi = float(i);
    vec2 g = vec2(uv.x*9.0 + fi*3.7, uv.y*4.5 - t*(0.7 + fi*0.25));
    vec2 id = floor(g), f = fract(g);
    float h = hash(id + fi*17.0);
    if(h > 0.93){
      float d = length(f - 0.5);
      em += smoothstep(0.16, 0.0, d) * (0.45 + 0.55*sin(T*9.0 + h*40.0));
    }
  }
  col += vec3(1.0, 0.6, 0.22) * em * 0.9 * smoothstep(0.0, 0.5, uv.y) * (1.0 - smoothstep(0.85, 1.0, uv.y));

  // warm ambient + glow at the base (square explicitly; pow() of a negative
  // base is undefined in GLSL and yields NaN)
  float gy = (uv.y - 0.18) * 2.6;
  float gx = cx * 1.8;
  float glow = exp(-gy*gy) * exp(-gx*gx);
  col += vec3(0.7, 0.28, 0.08) * glow * 0.38;
  col += mix(vec3(0.05, 0.02, 0.012), vec3(0.005), uv.y);

  // vignette
  float vig = smoothstep(1.15, 0.35, length((uv - vec2(0.5, 0.42)) * vec2(aspect, 1.0)));
  col *= 0.55 + 0.55 * vig;

  gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const a = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(a);
gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
const uR = gl.getUniformLocation(prog, 'R');
const uT = gl.getUniformLocation(prog, 'T');

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(canvas.clientWidth * dpr);
  canvas.height = Math.floor(canvas.clientHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

function draw(t){
  resize();
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, t);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}
const start = performance.now();
draw(2.0); // paint a first frame immediately, before the animation loop
function frame(now){ draw((now - start) / 1000); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
</body>
</html>
