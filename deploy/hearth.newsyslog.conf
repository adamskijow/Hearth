# SPDX-License-Identifier: MIT
#
# newsyslog drop-in for the Hearth root daemon's own stdout/stderr, which launchd
# writes to /var/log and which would otherwise grow unbounded (the in-app
# LogRotationPolicy rotates only the runner's piped log, not the daemon's stderr).
# Installed to /etc/newsyslog.d/hearth.conf by scripts/install-daemon.sh.
#
# logfilename               owner:group  mode count size(KB) when flags
/var/log/hearth.out.log     root:wheel   600  3     5120     *    Z
/var/log/hearth.err.log     root:wheel   600  3     5120     *    Z
