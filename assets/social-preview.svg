<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-labelledby="t d">
  <title id="t">Hearth</title>
  <desc id="d">Keep Ollama and other local LLM runners alive on a headless Mac.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b0e08"/><stop offset="1" stop-color="#0c0604"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.6">
      <stop offset="0" stop-color="#ff7a18" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#c43c0a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c43c0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fo" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#a51f06"/><stop offset="0.55" stop-color="#e8500f"/><stop offset="1" stop-color="#ff8a1e"/>
    </linearGradient>
    <linearGradient id="fm" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e0490d"/><stop offset="0.6" stop-color="#ff9a22"/><stop offset="1" stop-color="#ffc44d"/>
    </linearGradient>
    <linearGradient id="fc" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffb52e"/><stop offset="1" stop-color="#fff1c2"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="eb" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="372" cy="360" rx="320" ry="290" fill="url(#glow)"/>

  <!-- logs -->
  <g transform="translate(372 500)">
    <rect x="-120" y="0" width="240" height="28" rx="14" fill="#3a241a"/>
    <rect x="-95" y="-16" width="190" height="26" rx="13" fill="#4a2e20" transform="rotate(-7 0 -3)"/>
    <rect x="-88" y="-13" width="176" height="24" rx="12" fill="#5a3724" transform="rotate(8 0 -1)"/>
    <ellipse cx="-103" cy="-6" rx="13" ry="11" fill="#7a4a2e"/>
    <ellipse cx="103" cy="-6" rx="13" ry="11" fill="#7a4a2e"/>
  </g>

  <!-- flame -->
  <g transform="translate(372 500) scale(1.5)">
    <path fill="url(#fo)" filter="url(#soft)" opacity="0.96"
      d="M0,4 C70,-26 86,-96 58,-150 C44,-178 60,-196 30,-238 C16,-258 22,-286 4,-300 C-2,-272 8,-250 -12,-224 C-40,-188 -54,-214 -56,-168 C-58,-128 -82,-104 -50,-50 C-30,-16 -36,-4 0,4 Z"/>
    <path fill="url(#fm)" filter="url(#soft)" opacity="0.95"
      d="M0,2 C44,-22 56,-74 38,-116 C28,-138 40,-156 20,-188 C10,-204 14,-224 2,-236 C-2,-214 4,-198 -8,-178 C-28,-150 -36,-168 -38,-132 C-40,-102 -54,-84 -32,-44 C-18,-18 -22,-6 0,2 Z"/>
    <path fill="url(#fc)" opacity="0.96"
      d="M0,0 C24,-16 30,-50 20,-82 C14,-100 22,-114 10,-138 C5,-150 8,-162 1,-170 C-2,-152 1,-140 -6,-124 C-18,-104 -22,-118 -22,-92 C-22,-70 -30,-58 -16,-30 C-8,-12 -10,-4 0,0 Z"/>
  </g>

  <!-- embers -->
  <g fill="#ffb24a" filter="url(#eb)">
    <circle cx="300" cy="250" r="4"/>
    <circle cx="430" cy="200" r="3"/>
    <circle cx="372" cy="150" r="3.4"/>
    <circle cx="270" cy="320" r="2.6"/>
  </g>

  <!-- text -->
  <g transform="translate(572 0)">
    <text x="0" y="298" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" font-size="124" font-weight="700" fill="#f7ead8" letter-spacing="1">Hearth</text>
    <text x="4" y="352" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="27" fill="#d8b79b">Keep your local LLM runner alive on a headless Mac.</text>
    <text x="4" y="398" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="19" fill="#ff9a3c" letter-spacing="0.5">Ollama &#183; LM Studio &#183; mlx_lm &#183; macOS menubar supervisor</text>
  </g>
</svg>
